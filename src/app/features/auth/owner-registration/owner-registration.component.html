<div class="register-wrapper animate-fadeIn">
  <div class="hero-bg-bloom bloom-1"></div>
  <div class="hero-bg-bloom bloom-2"></div>

  <form class="register-form" [formGroup]="ownerRegistrationForm" (ngSubmit)="submitOwnerRegistration()">
    <div class="register-header">
      <h4 class="register-title">Create your Account</h4>
      <p class="register-subtitle">Start managing your medical services today</p>
    </div>

    <div class="form-section">

      <div class="form-group">
        <label class="form-label">Email</label>
        <input pInputText class="custom-input" type="email" formControlName="email"
          placeholder="john@example.com" />
        <app-form-error [form]="ownerRegistrationForm" controlName="email" requiredMessage="Email is required" invalidMessage="Please enter a valid email">
        </app-form-error>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <p-password formControlName="password" [toggleMask]="true" [feedback]="false" placeholder="••••••••"
          class="custom-password">
        </p-password>
        <app-form-error [form]="ownerRegistrationForm" controlName="password"
          message="Password is required (min 6 characters)">
        </app-form-error>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <p-password formControlName="confirmPassword" [toggleMask]="true" [feedback]="false" placeholder="••••••••"
          class="custom-password">
        </p-password>
        <app-form-error [form]="ownerRegistrationForm" controlName="confirmPassword"
          requiredMessage="Confirm password is required" passwordMismatchMessage="Passwords do not match">
        </app-form-error>
      </div>
    </div>

    <!-- API / ERROR SECTION -->
    <div class="error-container">
      @if (error) {
      <small class="form-error-text block">
        <i class="pi pi-exclamation-circle"></i> {{ error }}
      </small>
      }
    </div>

    <div class="form-actions">
      <button type="submit" class="register-btn-main" [disabled]="ownerRegistrationForm.invalid">
        Create Account
      </button>
      <p class="login-redirect">
        Already have an account? <a routerLink="/account/login">Sign in</a>
      </p>
    </div>

  </form>
</div>
