  <div class="hero-bg-bloom bloom-1"></div>
  <div class="hero-bg-bloom bloom-2"></div>

  <div class="login-container">
    <!-- Left Panel - Pharmacy Illustration -->

            <rect x="140" y="28" width="20" height="32" rx="5" fill="#00BCD4" opacity="0.6"/>
            <rect x="144" y="22" width="12" height="8" rx="3" fill="#0097A7"/>
            <rect x="170" y="40" width="16" height="20" rx="4" fill="#F59E0B" opacity="0.6"/>
            <rect x="173" y="34" width="10" height="8" rx="3" fill="#D97706"/>

            <!-- Medicine Bottles - Row 2 -->
            <rect x="210" y="32" width="24" height="28" rx="5" fill="#10B981" opacity="0.7"/>
            <rect x="214" y="26" width="16" height="8" rx="3" fill="#059669"/>
            <rect x="244" y="38" width="18" height="22" rx="4" fill="#00BCD4" opacity="0.7"/>
            <rect x="247" y="32" width="12" height="8" rx="3" fill="#0097A7"/>
            <rect x="274" y="28" width="22" height="32" rx="5" fill="#00BCD4" opacity="0.5"/>
            <rect x="278" y="22" width="14" height="8" rx="3" fill="#0097A7"/>
            <rect x="306" y="36" width="16" height="24" rx="4" fill="#10B981" opacity="0.6"/>
            <rect x="309" y="30" width="10" height="8" rx="3" fill="#059669"/>

            <rect x="85" y="100" width="20" height="30" rx="5" fill="#00BCD4" opacity="0.7"/>
            <rect x="89" y="94" width="12" height="8" rx="3" fill="#0097A7"/>
            <rect x="115" y="106" width="16" height="24" rx="4" fill="#10B981" opacity="0.6"/>
            <rect x="118" y="100" width="10" height="8" rx="3" fill="#059669"/>
            <rect x="142" y="98" width="22" height="32" rx="5" fill="#F59E0B" opacity="0.5"/>
            <rect x="146" y="92" width="14" height="8" rx="3" fill="#D97706"/>
            <rect x="175" y="104" width="18" height="26" rx="4" fill="#00BCD4" opacity="0.6"/>
            <rect x="178" y="98" width="12" height="8" rx="3" fill="#0097A7"/>
            <rect x="205" y="96" width="20" height="34" rx="5" fill="#10B981" opacity="0.7"/>
            <rect x="209" y="90" width="12" height="8" rx="3" fill="#059669"/>
            <rect x="236" y="102" width="16" height="28" rx="4" fill="#00BCD4" opacity="0.5"/>

            <circle cx="320" cy="207" r="3" fill="rgba(245,158,11,0.2)"/>
            <circle cx="328" cy="207" r="3" fill="rgba(245,158,11,0.2)"/>

            <!-- Pharmacist / Staff Figure -->

            <rect x="170" y="160" width="60" height="60" rx="12" fill="rgba(0,188,212,0.12)"/>

            <circle cx="200" cy="148" r="22" fill="rgba(0,188,212,0.15)"/>

            <rect x="196" y="182" width="8" height="2" rx="1" fill="rgba(0,188,212,0.4)"/>
            <rect x="199" y="179" width="2" height="8" rx="1" fill="rgba(0,188,212,0.4)"/>

            <!-- Floating Elements -->

            <!-- Heart Rate Line -->

                    stroke="#00BCD4" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"
                    class="ecg-line"/>
            </g>

            <!-- Floating Pill 1 -->
            <g class="float-pill-1" transform="translate(320, 270)">
              <rect width="28" height="14" rx="7" fill="rgba(0,188,212,0.15)" stroke="#00BCD4" stroke-width="1.5"/>
              <line x1="14" y1="0" x2="14" y2="14" stroke="#00BCD4" stroke-width="1.5"/>
              <circle cx="7" cy="7" r="2" fill="#00BCD4" opacity="0.4"/>
              <circle cx="21" cy="7" r="2" fill="#00BCD4" opacity="0.4"/>
            </g>

            <!-- Floating Pill 2 -->
            <g class="float-pill-2" transform="translate(30, 160)">
              <rect width="24" height="12" rx="6" fill="rgba(16,185,129,0.15)" stroke="#10B981" stroke-width="1.5"/>
              <line x1="12" y1="0" x2="12" y2="12" stroke="#10B981" stroke-width="1.5"/>
            </g>

            <!-- Health Cross -->
            <g class="float-cross" transform="translate(340, 140)">
              <rect x="0" y="8" width="20" height="4" rx="2" fill="rgba(0,188,212,0.2)"/>
              <rect x="8" y="0" width="4" height="20" rx="2" fill="rgba(0,188,212,0.2)"/>
            </g>

            <!-- DNA Helix Decoration -->
            <g class="dna-deco" transform="translate(355, 240)" opacity="0.12">
              <path d="M0 0 C12 8, 0 16, 12 24 C0 32, 12 40, 0 48" stroke="#00BCD4" stroke-width="2"/>
              <path d="M12 0 C0 8, 12 16, 0 24 C12 32, 0 40, 12 48" stroke="#00BCD4" stroke-width="2"/>
            </g>

            <!-- Shield / Security Icon -->
            <g transform="translate(20, 250)" opacity="0.2">
              <path d="M12 0 L24 6 L24 18 Q24 26 12 30 Q0 26 0 18 L0 6 Z" fill="none" stroke="#10B981" stroke-width="2"/>
              <path d="M8 15 L11 18 L17 12" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </g>

          </svg>
        </div>

        <!-- Text -->
        <div class="left-text">
          <h2>Your Pharmacy, <span class="text-cyan">Simplified.</span></h2>
          <p>Inventory, Billing & Analytics for modern medical stores.</p>
        </div>
      </div>
    </div>

    <!-- Right Panel - Form -->
    <div class="login-right-panel">
      <div class="form-section">
        <h2 class="form-title">Sign In</h2>
        <p class="form-subtitle">Welcome back! Enter your credentials to continue.</p>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label class="form-label">Email</label>
            <div class="input-wrap">
              <i class="pi pi-envelope input-icon"></i>
              <input type="email" class="form-input" placeholder="you@company.com" formControlName="email" />
            </div>
            <app-form-error [form]="loginForm" controlName="email" requiredMessage="Email is required" invalidMessage="Enter a valid email" />
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-wrap">
              <i class="pi pi-lock input-icon"></i>
              <p-password formControlName="password" [toggleMask]="true" [feedback]="false" [promptLabel]="'Enter your password'" [placeholder]="'Enter your password'" class="custom-password"></p-password>
            </div>
            <app-form-error [form]="loginForm" controlName="password" requiredMessage="Password is required" minLengthMessage="Password must be at least 6 characters"></app-form-error>
          </div>

          <div class="error-row">
            @if (error) {
              <small class="form-error-text">{{ error }}</small>
            }
          </div>

          <button type="submit" class="btn-login" [disabled]="loading">
            @if (loading) {
              <span class="spinner"></span> Signing in...
            } @else {
              Sign In <i class="pi pi-arrow-right"></i>
            }
          </button>

          <div class="forgot-link">
            <button type="button" (click)="forgotPassword()">Forgot Password?</button>
          </div>

          <div class="signup-row">
            <span class="divider-line"></span>
            <span class="divider-text">or</span>
            <span class="divider-line"></span>
          </div>

          <p class="signup-text">
            Don't have an account?
            <a routerLink="/account/owner-registration">Create Account</a>
          </p>
        </form>
      </div>
    </div>
  </div>
</div>
