<div class="p-6">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10 animate-fadeIn">
        <div>
            <h1 class="text-3xl font-bold">Subscription Plans</h1>
            <p class="text-gray-500">Define and manage tiered service levels for the platform.</p>
        </div>
        <div>
            <button pButton label="Create New Plan" icon="pi pi-plus"
                class="p-button-raised p-button-info p-shadow-2 hover:p-shadow-6 transition-all w-full md:w-auto"
                (click)="showCreateDialog()"></button>
        </div>
    </div>

    <div class="animate-fadeIn">
        <app-generic-grid [data]="plans" [columns]="cols" [actions]="actions"
            (actionExecuted)="handleAction($event)"></app-generic-grid>
    </div>

    <!-- Create Plan Dialog -->
    <p-dialog header="Subscription Plan Details" [(visible)]="displayDialog" [modal]="true"
        [style]="{width: '90vw', maxWidth: '600px'}" [draggable]="false" [resizable]="false">
        <form [formGroup]="planForm" (ngSubmit)="savePlan()">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 py-4">
                <div class="flex flex-col gap-2">
                    <label class="font-bold text-sm">Plan Name</label>
                    <input pInputText placeholder="e.g. Enterprise Plus" formControlName="name" class="w-full"
                        [ngClass]="{'ng-invalid ng-dirty': isFieldInvalid('name')}" />
                    <app-form-error [form]="planForm" controlName="name"></app-form-error>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="font-bold text-sm">Plan Type</label>
                    <p-dropdown [options]="typeOptions" optionLabel="label" optionValue="value" formControlName="type"
                        styleClass="w-full" [ngClass]="{'ng-invalid ng-dirty': isFieldInvalid('type')}"></p-dropdown>
                    <app-form-error [form]="planForm" controlName="type"></app-form-error>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="font-bold text-sm">Monthly Price (₹)</label>
                    <p-inputNumber mode="currency" currency="INR" locale="en-IN" formControlName="price"
                        styleClass="w-full"
                        [ngClass]="{'ng-invalid ng-dirty': isFieldInvalid('price')}"></p-inputNumber>
                    <app-form-error [form]="planForm" controlName="price"></app-form-error>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="font-bold text-sm">Store Limit</label>
                    <p-inputNumber formControlName="storeLimit" [min]="1" styleClass="w-full"
                        [ngClass]="{'ng-invalid ng-dirty': isFieldInvalid('storeLimit')}"></p-inputNumber>
                    <app-form-error [form]="planForm" controlName="storeLimit"></app-form-error>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="font-bold text-sm">Duration (Days)</label>
                    <p-inputNumber formControlName="durationInDays" [min]="1" styleClass="w-full"
                        [ngClass]="{'ng-invalid ng-dirty': isFieldInvalid('durationInDays')}"></p-inputNumber>
                    <app-form-error [form]="planForm" controlName="durationInDays"></app-form-error>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="font-bold text-sm">Status</label>
                    <p-dropdown [options]="statusOptions" optionLabel="label" optionValue="value"
                        formControlName="status" styleClass="w-full"
                        [ngClass]="{'ng-invalid ng-dirty': isFieldInvalid('status')}"></p-dropdown>
                    <app-form-error [form]="planForm" controlName="status"></app-form-error>
                </div>
                <div class="flex flex-col gap-2 md:col-span-2">
                    <label class="font-bold text-sm">Description</label>
                    <textarea pInputTextarea rows="3" placeholder="What's included in this tier?"
                        formControlName="description" class="w-full"
                        [ngClass]="{'ng-invalid ng-dirty': isFieldInvalid('description')}"></textarea>
                    <app-form-error [form]="planForm" controlName="description"></app-form-error>
                </div>
            </div>

            <div class="flex justify-end gap-2 mt-4 pt-4 border-t border-gray-100">
                <p-button icon="pi pi-times" (click)="displayDialog=false" label="Cancel" [text]="true"
                    severity="secondary" type="button"></p-button>
                <p-button icon="pi pi-check" type="submit" label="Save Plan" severity="info"
                    [loading]="isSubmitting"></p-button>
            </div>
        </form>
    </p-dialog>
</div>
