<div class="p-6">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8 animate-fadeIn">
        <div>
            <h1 class="text-3xl font-bold">Tenant Management</h1>
            <p class="text-gray-500">Manage all pharmacy owners and their access levels.</p>
        </div>
        <div class="flex flex-wrap gap-3 w-full md:w-auto">
            <span class="p-input-icon-left flex-grow md:flex-grow-0">
                <i class="pi pi-search"></i>
                <input type="text" pInputText placeholder="Search Owners..." class="p-inputtext-sm w-full" />
            </span>
            <button pButton icon="pi pi-filter" class="p-button-outlined p-button-sm"></button>
            <button pButton label="Export" icon="pi pi-file-excel"
                class="p-button-outlined p-button-sm p-button-success"></button>
        </div>
    </div>

    <div class="animate-fadeIn">
        <app-generic-grid [data]="owners" [columns]="cols" [actions]="actions"
            (actionExecuted)="handleAction($event)"></app-generic-grid>
    </div>

    <!-- Action Confirmation Dialog (Example) -->
    <p-toast></p-toast>
    <p-confirmDialog></p-confirmDialog>
</div>
