<div class="grid-container animate-fadeIn">
    <p-table [value]="data" [columns]="columns" [paginator]="true" [rows]="rows" [responsiveLayout]="'scroll'"
        styleClass="p-datatable-gridlines p-datatable-sm custom-table" [showCurrentPageReport]="true"
        currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
        [rowsPerPageOptions]="[5, 10, 25, 50]">
        <ng-template pTemplate="header" let-columns>
            <tr>
                <th *ngFor="let col of columns" [pSortableColumn]="col.field" [style.width]="col.width">
                    <div class="flex items-center gap-2">
                        {{ col.header }}
                        <p-sortIcon *ngIf="col.sortable !== false" [field]="col.field"></p-sortIcon>
                    </div>
                </th>
                <th *ngIf="actions && actions.length > 0" class="text-center" style="width: 150px">
                    Actions
                </th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-rowData let-columns="columns">
            <tr class="hover-row">
                <td *ngFor="let col of columns">
                    <ng-container [ngSwitch]="col.type">

                        <span *ngSwitchCase="'date'" class="text-sm font-medium">
                            {{ rowData[col.field] | date:'mediumDate' }}
                        </span>

                        <span *ngSwitchCase="'currency'" class="text-sm font-bold text-primary">
                            {{ rowData[col.field] | currency:'INR':'symbol' }}
                        </span>

                        <p-tag *ngSwitchCase="'status'" [value]="rowData[col.field]"
                            [severity]="getStatusSeverity(rowData[col.field])">
                        </p-tag>

                        <p-tag *ngSwitchCase="'badge'" [value]="rowData[col.field]" severity="info">
                        </p-tag>

                        <div *ngSwitchCase="'image'" class="flex justify-center">
                            <img [src]="rowData[col.field]" class="w-10 h-10 rounded-full shadow-sm border"
                                [alt]="rowData[col.field]" onerror="this.src='assets/images/placeholder-user.png'" />
                        </div>

                        <div *ngSwitchCase="'boolean'" class="text-center">
                            <i class="pi"
                                [ngClass]="rowData[col.field] ? 'pi-check-circle text-green-500' : 'pi-times-circle text-red-500'"></i>
                        </div>

                        <span *ngSwitchDefault class="text-sm">
                            {{ rowData[col.field] }}
                        </span>

                    </ng-container>
                </td>

                <td *ngIf="actions && actions.length > 0" class="text-center">
                    <div class="flex justify-center gap-2">
                        <p-button *ngFor="let action of actions" [icon]="action.icon"
                            [label]="showActionLabels ? action.label : ''" [severity]="action.severity || 'secondary'"
                            [text]="true" [pTooltip]="action.tooltip || action.label" tooltipPosition="top"
                            styleClass="action-btn p-button-rounded p-button-sm"
                            (click)="onActionClick(action.id, rowData)"></p-button>
                    </div>
                </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
            <tr>
                <td [attr.colspan]="columns.length + (actions.length > 0 ? 1 : 0)" class="text-center p-8">
                    <div class="flex flex-col items-center gap-3 py-10 opacity-60">
                        <i class="pi pi-inbox text-5xl"></i>
                        <p class="text-lg font-medium">No records found</p>
                    </div>
                </td>
            </tr>
        </ng-template>

    </p-table>
</div>
