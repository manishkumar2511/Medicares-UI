<div class="support-tab-wrapper">
    <!-- Vertical Tab Toggle (Desktop) / Circle (Mobile) -->
    <div class="support-tab" [style.top.px]="y" (mousedown)="onMouseDown($event)" (touchstart)="onTouchStart($event)"
        (click)="toggleChat($event)" [class.dragging]="isDragging" [class.hidden]="showChat()">
        <div class="tab-content">
            <i class="pi pi-comments"></i>
            <span>24/7 CUSTOMER SUPPORT</span>
        </div>
    </div>

    <!-- WhatsApp Style Chat Window -->
    <div class="chatbox-window shadow-8" *ngIf="showChat()" [class.mobile-full]="isMobile()">

        <!-- Header -->
        <div class="chat-header">
            <div class="header-content">
                <div class="left-section">
                    <div class="brand-avatar shadow-2">
                        <svg width="40" height="40" viewBox="0 0 64 64">
                            <circle cx="32" cy="32" r="32" fill="#fff" />
                            <circle cx="32" cy="28" r="24" fill="#19B6E6" />
                            <rect x="29" y="16" width="6" height="24" rx="2" fill="#fff" />
                            <rect x="16" y="25" width="24" height="6" rx="2" fill="#fff" />
                        </svg>
                    </div>
                    <div class="brand-info">
                        <span class="name">Medicares Solutions</span>
                        <div class="status-container">
                            <span class="status" *ngIf="!isTyping()">System Online</span>
                            <span class="typing-status" *ngIf="isTyping()">Medicares assistant is typing...</span>
                        </div>
                    </div>
                </div>
                <div class="right-section">
                    <p-button icon="pi pi-times" [text]="true" [rounded]="true" styleClass="close-btn"
                        (onClick)="showChat.set(false)"></p-button>
                </div>
            </div>
        </div>

        <!-- Chat Body (Messages) -->
        <div class="chat-body" #scrollMe>
            <div class="message-container">
                <div class="date-label"><span>TODAY</span></div>

                <!-- DYNAMIC MESSAGES LOOP -->
                <div *ngFor="let msg of messages(); trackBy: trackByFn" class="message" [ngClass]="msg.sender">
                    <div class="bubble shadow-1">
                        <p class="text">{{ msg.text }}</p>
                        <div class="meta">
                            <span class="time">{{ msg.time }}</span>
                            <div class="ticks" *ngIf="msg.sender === 'user'">
                                <i class="pi pi-check"></i>
                                <i class="pi pi-check"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Visual Typing Indicator in Body -->
                <div class="message assistant" *ngIf="isTyping()">
                    <div class="bubble typing-bubble shadow-1">
                        <div class="dot-typing"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat Footer (Input) -->
        <div class="chat-footer">
            <div class="input-area">
                <input type="text" pInputText placeholder="Type a message..." class="message-input"
                    [value]="userInput()" (input)="userInput.set($any($event.target).value)"
                    (keyup.enter)="onSendMessage()" />

                <button class="send-btn" (click)="onSendMessage()">
                    <i class="pi pi-send"></i>
                </button>
            </div>
            <div class="footer-legal">
                <p>Powered by Medicares Solutions</p>
            </div>
        </div>

    </div>
</div>
