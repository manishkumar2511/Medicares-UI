<div class="layout-wrapper" [class.authenticated]="isAuthenticated()"
    [class.sidebar-collapsed]="!isSidebarOpen()">

    <!-- Sidebar hidden via CSS (not @if) to prevent double-logo flash on logout -->
    <app-sidebar
        [class.hidden]="!isAuthenticated()"
        [isOpen]="isSidebarOpen()"
        (toggleSidebar)="toggleSidebar()"
        [class.active]="isSidebarOpen()">
    </app-sidebar>

    <div class="main-container">
        <app-topbar [isSidebarOpen]="isSidebarOpen()" (toggleSidebar)="toggleSidebar()"></app-topbar>
        <main class="content-area">
            <router-outlet></router-outlet>
        </main>
        <app-footer></app-footer>
    </div>

    <!-- Floating Support Tab -->
    @if (isAuthenticated()) {
        <app-support-tab></app-support-tab>
    }
</div>
