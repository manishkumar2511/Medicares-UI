<div class="topbar" 
     [class.scrolled]="scrolled"
     [class.guest-mode]="!isAuthenticated()" 
     [class.auth-mode]="isAuthenticated()"
     [class.menu-open]="mobileMenuOpen">
  <div class="topbar-container">
    <div class="topbar-left">
      <a class="brand" (click)="navigateToHome()" aria-label="Medicares home" [class.hidden]="isAuthenticated()">
        <svg class="original-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" width="150px">
          <defs>
            <linearGradient id="logoGrad" x1="0" x2="1">
              <stop offset="0" stop-color="#A8EEFF" />
              <stop offset="1" stop-color="#19B6E6" />
            </linearGradient>
          </defs>
          <circle cx="32" cy="32" r="30" [attr.fill]="isDarkMode() ? '#2D2D2D' : '#ffffff'" />
          <circle cx="32" cy="28" r="20" fill="url(#logoGrad)" />
          <rect x="30" y="20" width="6" height="20" rx="2" fill="#ffffff" />
          <rect x="20" y="28" width="20" height="6" rx="2" fill="#ffffff" />
          <g transform="translate(68,44)">
            <text x="0" y="0" font-size="34" font-weight="1000" [attr.fill]="isDarkMode() ? '#ffffff' : '#111111'">Medi</text>
            <text x="78" y="0" font-size="34" font-weight="1000" fill="#00BCD4">cares</text>
          </g>
        </svg>
      </a>

      <div class="auth-brand-group" [class.hidden]="!isAuthenticated()" (click)="onToggleSidebar()">
        <i class="pi pi-bars auth-hamburger lg:mr-2"></i>
        <h1 class="auth-page-title">{{ pageTitle }}</h1>
      </div>
    </div>

    <div class="topbar-right">
      <nav class="topbar-nav desktop-only" [class.hidden]="isAuthenticated()">
        <a routerLink="/" class="nav-link" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
        <a routerLink="/pricing" class="nav-link" routerLinkActive="active">Pricing</a>
        <a routerLink="/services" class="nav-link" routerLinkActive="active">Services</a>
        <a routerLink="/about" class="nav-link" routerLinkActive="active">About Us</a>
      </nav>

      <div class="topbar-actions" [class.hidden]="isAuthenticated()">
        <p-button label="Login" (onClick)="navigateToLogin()" class="ghost-btn-pill desktop-only"></p-button>
        <p-button label="Get Started" (onClick)="navigateToOwnerRegistration()" class="solid-btn-pill desktop-only"></p-button>
      </div>

      <div class="notification-wrapper" [class.hidden]="!isAuthenticated()" (click)="onOpenNotifications()">
        <i class="pi pi-bell"></i>
        <span class="notification-badge">3</span>
      </div>

      <button class="theme-toggle-btn desktop-only" (click)="toggleTheme()" [title]="isDarkMode() ? 'Switch to Light' : 'Switch to Dark'">
        <i class="pi" [ngClass]="isDarkMode() ? 'pi-sun' : 'pi-moon'"></i>
      </button>

      <!-- Hamburger — mobile/tablet only -->
      <div class="hamburger mobile-only" [class.hidden]="isAuthenticated()" (click)="toggleMobileMenu()" [class.active]="mobileMenuOpen">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>
  </div>

  <!-- Mobile Dropdown Menu -->
  <div class="mobile-menu mobile-only" [class.open]="mobileMenuOpen" [class.hidden]="isAuthenticated()">
    <nav class="mobile-nav">
      <a routerLink="/" class="mobile-nav-link" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMobileMenu()">
        <i class="pi pi-home"></i> Home
      </a>
      <a routerLink="/pricing" class="mobile-nav-link" routerLinkActive="active" (click)="closeMobileMenu()">
        <i class="pi pi-tag"></i> Pricing
      </a>
      <a routerLink="/services" class="mobile-nav-link" routerLinkActive="active" (click)="closeMobileMenu()">
        <i class="pi pi-th-large"></i> Services
      </a>
      <a routerLink="/about" class="mobile-nav-link" routerLinkActive="active" (click)="closeMobileMenu()">
        <i class="pi pi-info-circle"></i> About Us
      </a>
    </nav>
    <div class="mobile-theme-toggle" (click)="toggleTheme()">
      <i class="pi" [ngClass]="isDarkMode() ? 'pi-sun' : 'pi-moon'"></i>
      <span>{{ isDarkMode() ? 'Switch to Light' : 'Switch to Dark' }}</span>
    </div>
    <div class="mobile-menu-actions">
      <p-button label="Login" (onClick)="navigateToLogin(); closeMobileMenu()" class="ghost-btn-pill mobile-full"></p-button>
      <p-button label="Get Started" (onClick)="navigateToOwnerRegistration(); closeMobileMenu()" class="solid-btn-pill mobile-full"></p-button>
    </div>
  </div>
</div>

<!-- Backdrop to close menu when clicking outside -->
<div class="mobile-backdrop" [class.visible]="mobileMenuOpen && !isAuthenticated()" (click)="closeMobileMenu()"></div>
